<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>k16kgw / hobbies</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Helvetica Neue", Arial, sans-serif;
      line-height: 1.6;
      color: #333;
      background-color: #fff;
    }

    /* ── Header ── */
    header {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      background-color: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(5px);
      z-index: 999;
      border-bottom: 1px solid #ddd;
    }

    .header-container {
      display: flex;
      align-items: center;
      max-width: 960px;
      margin: 0 auto;
      padding: 10px 20px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: bold;
      margin-right: auto;
    }

    .logo-link {
      color: inherit;
      text-decoration: none;
    }

    nav ul {
      list-style: none;
      display: flex;
    }

    nav ul li { margin-left: 20px; }

    nav ul li a {
      text-decoration: none;
      color: #333;
      font-size: 1rem;
      padding: 5px 0;
      transition: color 0.3s;
    }

    nav ul li a:hover { color: #007BFF; }

    /* ── Main ── */
    main { margin-top: 80px; }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 20px;
    }

    section { margin-bottom: 40px; }

    section h2 {
      font-size: 1.8rem;
      margin-bottom: 15px;
      border-bottom: 2px solid #ddd;
      padding-bottom: 5px;
    }

    .section-lead {
      color: #666;
      margin-bottom: 1.25rem;
      font-size: 0.95rem;
    }

    /* ── Project grid ── */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 420px), 1fr));
      gap: 1rem;
    }

    /* ── Project card ── */
    .card {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      text-decoration: none;
      color: inherit;
      border: 1px solid #ddd;
      border-left: 3px solid #007BFF;
      border-radius: 4px;
      padding: 1.25rem 1.5rem;
      transition: box-shadow 0.2s, border-color 0.2s;
    }

    .card:hover {
      box-shadow: 0 2px 12px rgba(0, 123, 255, 0.12);
      border-color: #007BFF;
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .card-cat {
      font-size: 0.72rem;
      font-weight: bold;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #007BFF;
    }

    .card-year {
      font-size: 0.75rem;
      color: #999;
    }

    .card-title {
      font-size: 1.2rem;
      font-weight: bold;
      color: #333;
    }

    .card-desc {
      font-size: 0.875rem;
      color: #666;
      line-height: 1.65;
      flex: 1;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.25rem;
      gap: 0.5rem;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
    }

    .tag {
      font-size: 0.7rem;
      color: #666;
      background: #f5f5f5;
      border: 1px solid #e0e0e0;
      padding: 0.1rem 0.5rem;
      border-radius: 3px;
    }

    .card-arrow {
      font-size: 1rem;
      color: #ccc;
      flex-shrink: 0;
      transition: color 0.2s;
    }

    .card:hover .card-arrow { color: #007BFF; }

    /* ── Footer ── */
    footer {
      background-color: #f8f8f8;
      border-top: 1px solid #ddd;
      text-align: center;
      padding: 10px 0;
      margin-top: 30px;
    }

    .footer-container {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 20px;
      font-size: 0.85rem;
      color: #666;
    }

    .footer-container a {
      color: #666;
      text-decoration: underline;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .header-container { padding: 10px 15px; }
      .projects-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-container">
    <h1><a class="logo-link" href="/">k16kgw / hobbies</a></h1>
    <nav>
      <ul>
        <li><a href="https://seminar.k16kgw.com" target="_blank">Main Site</a></li>
      </ul>
    </nav>
  </div>
</header>

<main>
  <div class="container">

    <section>
      <h2>Projects</h2>
      <p class="section-lead">気になることを、データで見る。</p>

      <div class="projects-grid">

        <!-- hot_days -->
        <a class="card" href="hot_days/">
          <div class="card-meta">
            <span class="card-cat">データ可視化</span>
            <span class="card-year">2025</span>
          </div>
          <div class="card-title">全国猛暑日マップ</div>
          <div class="card-desc">
            気象庁データで見る10年間（2016–2025）の猛暑日（最高気温35°C以上）の分布と変化。
            全国1,321地点を集計し、インタラクティブマップと統計グラフで可視化。
          </div>
          <div class="card-footer">
            <div class="card-tags">
              <span class="tag">Python</span>
              <span class="tag">Folium</span>
              <span class="tag">pandas</span>
              <span class="tag">気象データ</span>
            </div>
            <span class="card-arrow">↗</span>
          </div>
        </a>

      </div>
    </section>

  </div>
</main>

<footer>
  <div class="footer-container">
    <p>k16kgw — built with curiosity &nbsp;·&nbsp; <a href="https://github.com/k16kgw/hobbies" target="_blank">GitHub</a></p>
  </div>
</footer>

</body>
</html>
