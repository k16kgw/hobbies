<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>komachan / hobbies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300;1,9..144,700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #07090f;
      --surface:      #0d0f18;
      --surface-2:    #131621;
      --border:       #1c1f2e;
      --border-hover: #2a2e44;
      --accent:       #e85c2c;
      --accent-2:     #f5a623;
      --text:         #dde0ea;
      --muted:        #787b94;
      --faint:        #272a3a;
      --radius:       12px;
      --font-display: 'Fraunces', 'Hiragino Mincho ProN', 'Yu Mincho', serif;
      --font-mono:    'JetBrains Mono', 'Courier New', monospace;
      --font-body:    'Hiragino Sans', 'Noto Sans JP', 'Yu Gothic', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      line-height: 1.7;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* atmospheric background */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 90% 55% at 50% -5%,  rgba(232,92,44,.07)  0%, transparent 65%),
        radial-gradient(ellipse 55% 35% at 85% 85%,  rgba(245,166,35,.05) 0%, transparent 55%);
      pointer-events: none;
    }

    /* dot grid */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,.06) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* ── wrapper ── */
    .wrapper {
      position: relative; z-index: 1;
      max-width: 920px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* ── header ── */
    header {
      padding: 7rem 0 4.5rem;
      text-align: center;
      animation: fadeUp .75s ease both;
    }

    .author-tag {
      display: inline-flex;
      align-items: center;
      gap: .75rem;
      font-family: var(--font-mono);
      font-size: .72rem;
      color: var(--muted);
      letter-spacing: .15em;
      margin-bottom: 1.75rem;
    }
    .author-tag::before,
    .author-tag::after {
      content: '';
      display: block;
      width: 2.5rem;
      height: 1px;
      background: var(--border-hover);
    }

    header h1 {
      font-family: var(--font-display);
      font-size: clamp(3.8rem, 11vw, 6.5rem);
      font-weight: 300;
      font-style: italic;
      letter-spacing: -.025em;
      line-height: 1.05;
      color: var(--text);
      margin-bottom: 1.5rem;
    }
    header h1 em {
      font-style: normal;
      background: linear-gradient(120deg, var(--accent) 0%, var(--accent-2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header .tagline {
      font-size: .93rem;
      color: var(--muted);
      letter-spacing: .05em;
    }

    /* ── section divider ── */
    .section-head {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 3.5rem 0 2rem;
      animation: fadeUp .6s .2s ease both;
    }
    .section-head span {
      font-family: var(--font-mono);
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }
    .section-head::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border-hover), transparent);
    }

    /* ── project grid ── */
    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 400px), 1fr));
      gap: 1.25rem;
      padding-bottom: 6rem;
    }

    /* ── project card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem 1.75rem 1.5rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: .9rem;
      position: relative;
      overflow: hidden;
      transition: border-color .25s, transform .25s, box-shadow .25s;
    }

    /* left accent stripe */
    .card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--c-accent, var(--accent));
      border-radius: var(--radius) 0 0 var(--radius);
      opacity: .8;
    }

    /* hover glow */
    .card::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 90% 70% at 50% 0%, var(--c-glow, rgba(232,92,44,.1)), transparent 65%);
      opacity: 0;
      transition: opacity .35s;
      pointer-events: none;
    }

    .card:hover {
      border-color: var(--border-hover);
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(0,0,0,.45);
    }
    .card:hover::after { opacity: 1; }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: .4rem;
    }

    .card-cat {
      font-family: var(--font-mono);
      font-size: .65rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--c-accent, var(--accent));
      background: var(--c-bg, rgba(232,92,44,.1));
      padding: .18rem .6rem;
      border-radius: 4px;
    }

    .card-year {
      font-family: var(--font-mono);
      font-size: .65rem;
      color: var(--muted);
    }

    .card-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.25;
      color: var(--text);
    }

    .card-desc {
      font-size: .875rem;
      color: var(--muted);
      line-height: 1.7;
      flex: 1;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: .25rem;
      gap: .75rem;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: .3rem;
    }

    .tag {
      font-family: var(--font-mono);
      font-size: .62rem;
      color: var(--muted);
      background: var(--surface-2);
      border: 1px solid var(--faint);
      padding: .12rem .5rem;
      border-radius: 3px;
    }

    .card-arrow {
      font-size: 1.1rem;
      color: var(--faint);
      flex-shrink: 0;
      transition: color .2s, transform .2s;
      line-height: 1;
    }
    .card:hover .card-arrow {
      color: var(--c-accent, var(--accent));
      transform: translate(3px, -3px);
    }

    /* staggered entrance */
    .card { animation: fadeUp .6s ease both; }
    .card:nth-child(1) { animation-delay: .25s; }
    .card:nth-child(2) { animation-delay: .35s; }
    .card:nth-child(3) { animation-delay: .45s; }
    .card:nth-child(4) { animation-delay: .55s; }
    .card:nth-child(5) { animation-delay: .65s; }

    /* ── footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 2.5rem 0;
      text-align: center;
    }
    footer p {
      font-family: var(--font-mono);
      font-size: .7rem;
      color: var(--muted);
      letter-spacing: .08em;
    }
    footer a {
      color: var(--muted);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    /* ── animation ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── responsive ── */
    @media (max-width: 600px) {
      .wrapper { padding: 0 1.25rem; }
      header   { padding: 4.5rem 0 3rem; }
    }
  </style>
</head>
<body>

<div class="wrapper">

  <header>
    <div class="author-tag">komachan</div>
    <h1><em>hobbies</em></h1>
    <p class="tagline">気になることを、データで見る。</p>
  </header>

  <div class="section-head"><span>Projects</span></div>

  <div class="projects">

    <!-- hot_days -->
    <a class="card" href="hot_days/"
       style="--c-accent:#e85c2c; --c-glow:rgba(232,92,44,.12); --c-bg:rgba(232,92,44,.1);">
      <div class="card-meta">
        <span class="card-cat">データ可視化</span>
        <span class="card-year">2025</span>
      </div>
      <div class="card-title">全国猛暑日マップ</div>
      <div class="card-desc">
        気象庁データで見る10年間（2016–2025）の猛暑日（最高気温35°C以上）の分布と変化。
        全国1,321地点を集計し、インタラクティブマップと統計グラフで可視化。
      </div>
      <div class="card-footer">
        <div class="card-tags">
          <span class="tag">Python</span>
          <span class="tag">Folium</span>
          <span class="tag">pandas</span>
          <span class="tag">気象データ</span>
        </div>
        <span class="card-arrow">↗</span>
      </div>
    </a>

  </div>

  <footer>
    <p>komachan — built with curiosity &nbsp;·&nbsp; <a href="https://github.com/k16kgw/hobbies" target="_blank">GitHub</a></p>
  </footer>

</div>

</body>
</html>
